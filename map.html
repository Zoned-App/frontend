<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Zoned - Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link href="/src/style.css" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>

    <style>
        #map {
            height: calc(100vh - 176px); /* Adjust based on header + nav height */
            width: 100%;
            z-index: 10;
        }
        /* Custom Map Branding to match Zoned */
        .leaflet-tile-pane {
            filter: grayscale(100%) sepia(20%) hue-rotate(-15deg) brightness(1.05) contrast(0.95);
        }
        .leaflet-marker-icon {
            filter: hue-rotate(160deg) saturate(3); /* Make standard blue marker slightly more orange-ish if possible, otherwise we can use a custom icon */
        }
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(78, 33, 32, 0.1);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-[#fff4f3] dark:bg-stone-950 px-6 py-4 flex justify-between items-center transition-opacity hover:opacity-80">
        <div class="flex items-center gap-3">
        </div>
        <h1 class="text-2xl font-black italic tracking-tighter text-[#FC4C02]">MAP</h1>
        <a href="/profile.html" class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high ring-2 ring-[#FC4C02]/10 block">
            <img alt="User profile photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC27_Sx5jTVdwYPW--U290q3lEo6JWphHGEHWq6L0072Be6mBK5zH1QDwYexeLtvIxNzD-pm7o8Y1yuK3ekrExOaZ9AKgm3BpqOwDNRAmM3rW_PBUQjx0cFp6PPdKO_MRNaHenQQlITr1ly7f4eQNpAQ0L9yoM3_rY9IQLF3lW1u210lFI3tyBNSOAn4ZTeUo1c6rEmF1svCXF1nG5EhwZxMZ3L7TpZ4LCRP-mDDEEMm5ZExcDlzxi15ObI368g-1gERBF_YVErf0Y"/>
        </a>
    </header>

    <main class="flex-1 mt-16 pb-24 overflow-hidden relative">
        <div id="map"></div>
    </main>

    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-24 bg-[#fff4f3]/80 dark:bg-stone-900/80 backdrop-blur-xl rounded-t-[3rem] shadow-[0_-20px_40px_rgba(78,33,32,0.04)] px-4 pb-6 pt-2">
        <!-- Explore -->
        <a href="/dashboard.html" class="flex flex-col items-center justify-center text-[#4e2120] dark:text-[#ffd2cf] opacity-60 px-6 py-2 hover:bg-[#ffedeb] dark:hover:bg-stone-800 rounded-full active:scale-90 transition-transform duration-300 ease-out">
            <span class="material-symbols-outlined" data-icon="explore">explore</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-extrabold uppercase tracking-widest">Explore</span>
        </a>
        <!-- Games -->
        <a href="/active-game.html" class="flex flex-col items-center justify-center text-[#4e2120] dark:text-[#ffd2cf] opacity-60 px-6 py-2 hover:bg-[#ffedeb] dark:hover:bg-stone-800 rounded-full active:scale-90 transition-transform duration-300 ease-out">
            <span class="material-symbols-outlined" data-icon="sports_esports">sports_esports</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-extrabold uppercase tracking-widest">Games</span>
        </a>
        <!-- Map (Active) -->
        <a href="/map.html" class="flex flex-col items-center justify-center bg-[#ffe1df] dark:bg-[#a93000]/20 text-[#FC4C02] dark:text-[#ff784e] rounded-full px-6 py-2 active:scale-90 transition-transform duration-300 ease-out">
            <span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-extrabold uppercase tracking-widest">Map</span>
        </a>
        <!-- Profile -->
        <a href="/profile.html" class="flex flex-col items-center justify-center text-[#4e2120] dark:text-[#ffd2cf] opacity-60 px-6 py-2 hover:bg-[#ffedeb] dark:hover:bg-stone-800 rounded-full active:scale-90 transition-transform duration-300 ease-out">
            <span class="material-symbols-outlined" data-icon="person">person</span>
            <span class="font-['Plus_Jakarta_Sans'] text-[10px] font-extrabold uppercase tracking-widest">Profile</span>
        </a>
    </nav>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Initialize the Map
        const map = L.map('map', {
            zoomControl: false // Disable default zoom control for custom placement
        }).setView([32.7767, -96.7970], 12); // Default view: Dallas, TX

        // Add OSM Tile Layer
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Add Custom Zoom Control
        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        // Initial Marker removed as requested

        // Click to drop marker functionality
        map.on('click', function(e) {
            const { lat, lng } = e.latlng;
            const newMarker = L.marker([lat, lng]).addTo(map)
                .bindPopup(`
                    <div class="p-2">
                        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 text-center">New Hideout</div>
                        <div class="text-xs font-black text-[#FC4C02] text-center">${lat.toFixed(4)}, ${lng.toFixed(4)}</div>
                        <div class="text-[8px] text-gray-400 mt-2 text-center italic">Click "×" to remove pin</div>
                    </div>
                `, { 
                    closeOnClick: false // Marker stays until "x" is clicked
                })
                .openPopup();

            // Remove marker from map when popup is closed
            newMarker.on('popupclose', function() {
                map.removeLayer(newMarker);
            });
        });
        
        // Fix for Leaflet initialization in hidden/tabbed containers
        setTimeout(() => {
            map.invalidateSize();
        }, 300);
    </script>
</body>
</html>
